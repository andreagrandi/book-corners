name: book-corners

services:
  app:
    build: .
    ports:
      # Host port range: Docker picks a free port (usually 8000). Discover it
      # with `docker compose port app 8000` or `scripts/local_env.py app-url`.
      - "8000-8010:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  tailwind:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run watch:css"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  worker:
    build: .
    command: python manage.py db_worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: book_corners
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host port range: avoids clashes with other local postgres instances.
      # Discover the assigned port with `docker compose port db 5432` or
      # `scripts/local_env.py database-url`; containers still use db:5432.
      - "5540-5550:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  node_modules:

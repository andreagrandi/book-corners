{% load i18n %}
<form id="favourite-button"
      method="post"
      hx-post="{% url 'toggle_favourite' slug=library.slug %}"
      hx-target="#favourite-button"
      hx-swap="outerHTML">
  {% csrf_token %}
  <button type="submit"
          class="btn btn-ghost btn-sm"
          aria-label="{% if is_favourited %}{% trans "Remove from favourites" %}{% else %}{% trans "Add to favourites" %}{% endif %}"
          title="{% if is_favourited %}{% trans "Remove from favourites" %}{% else %}{% trans "Add to favourites" %}{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 {% if is_favourited %}text-red-500{% else %}text-base-content/30{% endif %}" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
    </svg>
  </button>
</form>

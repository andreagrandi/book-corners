{% extends "base.html" %}

{% block title %}Submission received - Book Corners{% endblock %}

{% block content %}
  <section class="mx-auto w-full max-w-2xl">
    <article class="card border border-base-300 bg-base-100 shadow-sm">
      <div class="card-body gap-4 p-6">
        <h1 class="text-3xl font-bold">Submission received</h1>
        <p class="text-base-content/80">
          Thanks for contributing. Your library submission has been sent to moderators.
          It will be reviewed and approved as soon as possible.
        </p>
        <div class="card-actions justify-end">
          <a href="{% url 'home' %}" class="btn btn-primary">Continue</a>
        </div>
      </div>
    </article>
  </section>
{% endblock %}

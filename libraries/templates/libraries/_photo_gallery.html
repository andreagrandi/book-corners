{% load i18n %}
{% if approved_photos %}
  <section class="mt-6">
    <h2 class="text-xl font-semibold">{% trans "Community photos" %}</h2>
    <div class="mt-3 grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4">
      {% for photo in approved_photos %}
        <figure class="overflow-hidden rounded-box border border-base-300 bg-base-200">
          <a href="{{ photo.photo.url }}" target="_blank" rel="noopener noreferrer">
            <img
              src="{{ photo.card_photo_url }}"
              alt="{% if photo.caption %}{{ photo.caption }}{% else %}{% trans 'Community photo' %}{% endif %}"
              class="aspect-square w-full object-cover"
              loading="lazy"
            >
          </a>
          {% if photo.caption %}
            <figcaption class="px-2 py-1.5 text-xs text-base-content/70">{{ photo.caption }}</figcaption>
          {% endif %}
        </figure>
      {% endfor %}
    </div>
  </section>
{% endif %}
